name: Bug report
description: Report a reproducible problem in codex-oss.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the command and input values that caused the issue.
      placeholder: |
        node ./src/cli.js issue --repo owner/project --title "..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what should have happened instead.
    validations:
      required: true
